name: Release Pinemeter

on:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write

    env:
      EXPECTED_SIGNING_IDENTITY: "Developer ID Application: AUTIMO SYSTEMS INC (HMR9RDR6M2)"
      EXPECTED_TEAM_ID: HMR9RDR6M2

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract version from changelog
        id: version
        run: |
          VERSION=$(sed -n 's/^## \[\([^]]*\)\].*/\1/p' CHANGELOG.md | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract changelog
        id: changelog
        run: |
          VERSION=$(sed -n 's/^## \[\([^]]*\)\].*/\1/p' CHANGELOG.md | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          CONTENT=$(awk '
            /^## \[/ {
              if (found) exit
              found=1
              next
            }
            found { print }
          ' CHANGELOG.md)

          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1.7.0
        with:
          xcode-version: latest-stable

      - name: Update version in project
        run: |
          # Update MARKETING_VERSION in project.pbxproj
          sed -i '' "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = ${{ steps.version.outputs.version }}/g" Pinemeter.xcodeproj/project.pbxproj

          # Extract major version number for CURRENT_PROJECT_VERSION (e.g., 1.0.0 -> 1)
          BUILD_NUMBER=$(echo "${{ steps.version.outputs.version }}" | sed 's/[^0-9]*\([0-9]*\).*/\1/')
          sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*/CURRENT_PROJECT_VERSION = $BUILD_NUMBER/g" Pinemeter.xcodeproj/project.pbxproj

          echo "Updated version to ${{ steps.version.outputs.version }} (build $BUILD_NUMBER)"

      - name: Audit release signing and publishing assumptions
        run: |
          set -euo pipefail

          PROJECT_FILE="Pinemeter.xcodeproj/project.pbxproj"
          RELEASE_WORKFLOW=".github/workflows/release.yml"

          echo "Release signing preflight"
          echo "Expected signing identity: $EXPECTED_SIGNING_IDENTITY"
          echo "Expected team identifier: $EXPECTED_TEAM_ID"

          if grep -Eq 'CODE_SIGN_IDENTITY = "?Developer ID Application"?;' "$PROJECT_FILE"; then
            echo "::error::Project contains generic Developer ID Application signing identity"
            exit 1
          fi

          if grep -Eq 'CODE_SIGN_IDENTITY = "?Developer ID Application"?;' "$RELEASE_WORKFLOW"; then
            echo "::error::Release workflow contains generic Developer ID Application signing identity"
            exit 1
          fi

          TEAM_SECRET_NAME="APPLE_TEAM_ID"
          if grep -Fq "secrets.${TEAM_SECRET_NAME}" "$RELEASE_WORKFLOW" || grep -Eq "^[[:space:]]*${TEAM_SECRET_NAME}:" "$RELEASE_WORKFLOW"; then
            echo "::error::Release workflow must not rely on mutable ${TEAM_SECRET_NAME} secrets"
            exit 1
          fi

          if ! grep -Fq "CODE_SIGN_IDENTITY = \"$EXPECTED_SIGNING_IDENTITY\";" "$PROJECT_FILE"; then
            echo "::error::Project is missing pinned signing identity: $EXPECTED_SIGNING_IDENTITY"
            exit 1
          fi

          if ! grep -Fq "DEVELOPMENT_TEAM = $EXPECTED_TEAM_ID;" "$PROJECT_FILE"; then
            echo "::error::Project is missing pinned development team: $EXPECTED_TEAM_ID"
            exit 1
          fi

          echo "Remote mutation surfaces after local build verification:"
          echo "- GitHub release creation with contents:write permission"
          echo "- Homebrew tap clone, commit, and push with HOMEBREW_TAP_TOKEN"

      - name: Install Apple certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $RUNNER_TEMP/certificate.p12 \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k $KEYCHAIN_PATH

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          if ! security find-certificate -c "$EXPECTED_SIGNING_IDENTITY" $KEYCHAIN_PATH >/dev/null; then
            echo "::error::Expected signing certificate not found: $EXPECTED_SIGNING_IDENTITY"
            security find-identity -v -p codesigning $KEYCHAIN_PATH || true
            rm -f $RUNNER_TEMP/certificate.p12
            exit 1
          fi

          rm -f $RUNNER_TEMP/certificate.p12
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Build app
        run: |
          xcodebuild clean build \
            -project Pinemeter.xcodeproj \
            -scheme Pinemeter \
            -configuration Release \
            -derivedDataPath ./build \
            -arch x86_64 -arch arm64 \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$EXPECTED_SIGNING_IDENTITY" \
            DEVELOPMENT_TEAM="$EXPECTED_TEAM_ID" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options runtime"

      - name: Verify code signature
        run: |
          APP_PATH="build/Build/Products/Release/Pinemeter.app"
          echo "Verifying code signature..."
          codesign -vvv --deep --strict "$APP_PATH"
          echo "Checking signature details..."
          SIGNATURE_DETAILS=$(codesign -dvv "$APP_PATH" 2>&1)
          echo "$SIGNATURE_DETAILS"
          if ! echo "$SIGNATURE_DETAILS" | grep -Fq "Authority=$EXPECTED_SIGNING_IDENTITY"; then
            echo "::error::App was not signed by expected identity: $EXPECTED_SIGNING_IDENTITY"
            exit 1
          fi
          if ! echo "$SIGNATURE_DETAILS" | grep -Fq "TeamIdentifier=$EXPECTED_TEAM_ID"; then
            echo "::error::App was not signed with expected team: $EXPECTED_TEAM_ID"
            exit 1
          fi
          echo "Checking entitlements..."
          codesign -d --entitlements - "$APP_PATH"

      - name: Notarize app
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          APP_PATH="build/Build/Products/Release/Pinemeter.app"

          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > $RUNNER_TEMP/AuthKey.p8

          /usr/bin/ditto -c -k --keepParent "$APP_PATH" "$RUNNER_TEMP/Pinemeter-notarize.zip"

          echo "Submitting for notarization..."
          SUBMIT_OUTPUT=$(xcrun notarytool submit "$RUNNER_TEMP/Pinemeter-notarize.zip" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --wait 2>&1)

          echo "$SUBMIT_OUTPUT"

          # Extract submission ID
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep "id:" | head -1 | awk '{print $2}')

          # Check if notarization succeeded
          if echo "$SUBMIT_OUTPUT" | grep -q "status: Accepted"; then
            echo "Notarization succeeded!"
          else
            echo "Notarization failed. Fetching detailed log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --key "$RUNNER_TEMP/AuthKey.p8" \
              --key-id "$APP_STORE_CONNECT_KEY_ID" \
              --issuer "$APP_STORE_CONNECT_ISSUER_ID"
            rm -f $RUNNER_TEMP/AuthKey.p8 $RUNNER_TEMP/Pinemeter-notarize.zip
            exit 1
          fi

          echo "Stapling notarization ticket..."
          xcrun stapler staple "$APP_PATH"

          echo "Verifying..."
          spctl -a -t exec -vv "$APP_PATH"
          xcrun stapler validate "$APP_PATH"

          rm -f $RUNNER_TEMP/AuthKey.p8 $RUNNER_TEMP/Pinemeter-notarize.zip

      - name: Create ZIP
        run: |
          cd build/Build/Products/Release
          xattr -cr Pinemeter.app
          find Pinemeter.app -name '._*' -delete
          zip -r ../../../../Pinemeter-${{ steps.version.outputs.version }}.zip Pinemeter.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Pinemeter v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.content }}
          files: Pinemeter-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          SHA=$(shasum -a 256 Pinemeter-${{ steps.version.outputs.version }}.zip | cut -d' ' -f1)

          git clone https://x-access-token:${TAP_TOKEN}@github.com/eddmann/homebrew-tap.git
          cd homebrew-tap

          sed -i '' "s/version \".*\"/version \"${{ steps.version.outputs.version }}\"/" Casks/pinemeter.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA}\"/" Casks/pinemeter.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/pinemeter.rb
          git commit -m "chore(pinemeter): update to ${{ steps.version.outputs.version }}"
          git push

      - name: Cleanup keychain
        if: always()
        run: |
          if [[ -f "${KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain $KEYCHAIN_PATH || true
          fi
